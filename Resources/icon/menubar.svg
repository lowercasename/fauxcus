    </clipPath>
    <linearGradient id="monobands" gradientUnits="userSpaceOnUse" x1="271.9" y1="96.7" x2="402.5" y2="398.7">
      <stop offset="0" stop-color="#000000" stop-opacity="1"/>
      <stop offset="0.1667" stop-color="#000000" stop-opacity="1"/>
      <stop offset="0.1667" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.3333" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.3333" stop-color="#000000" stop-opacity="1"/>
      <stop offset="0.5" stop-color="#000000" stop-opacity="1"/>
      <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.6667" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.6667" stop-color="#000000" stop-opacity="1"/>
      <stop offset="0.8333" stop-color="#000000" stop-opacity="1"/>
      <stop offset="0.8333" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#prism)">
    <rect x="256" y="0" width="256" height="512" fill="url(#monobands)"/>
    <path d="M487.83,319.44,295.63,36.88a48,48,0,0,0-79.26,0L24.17,319.44A47.1,47.1,0,0,0,41.1,387.57L233.3,490.32a48.05,48.05,0,0,0,45.4,0L470.9,387.57a47.1,47.1,0,0,0,16.93-68.13Z"
