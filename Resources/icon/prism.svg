<?xml version="1.0" encoding="utf-8"?>
<svg width="800px" height="800px" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="prism">
      <path d="M487.83,319.44,295.63,36.88a48,48,0,0,0-79.26,0L24.17,319.44A47.1,47.1,0,0,0,41.1,387.57L233.3,490.32a48.05,48.05,0,0,0,45.4,0L470.9,387.57a47.1,47.1,0,0,0,16.93-68.13Z"/>
    </clipPath>
    <!-- Axis perpendicular to the right face's base edge
         (233.3,490.3)->(470.9,387.6), so the hard bands lie parallel to it. -->
    <linearGradient id="bands" gradientUnits="userSpaceOnUse" x1="271.9" y1="96.7" x2="402.5" y2="398.7">
      <stop offset="0" stop-color="#FF3B30"/>
      <stop offset="0.1667" stop-color="#FF3B30"/>
      <stop offset="0.1667" stop-color="#FF9500"/>
      <stop offset="0.3333" stop-color="#FF9500"/>
      <stop offset="0.3333" stop-color="#FFCC00"/>
      <stop offset="0.5" stop-color="#FFCC00"/>
      <stop offset="0.5" stop-color="#34C759"/>
      <stop offset="0.6667" stop-color="#34C759"/>
      <stop offset="0.6667" stop-color="#007AFF"/>
      <stop offset="0.8333" stop-color="#007AFF"/>
      <stop offset="0.8333" stop-color="#AF52DE"/>
      <stop offset="1" stop-color="#AF52DE"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#prism)">
    <!-- Left face: white light entering -->
    <rect x="0" y="0" width="256" height="512" fill="#FFFFFF"/>
    <!-- Right face: hard spectrum bands parallel to that face's base -->
    <rect x="256" y="0" width="256" height="512" fill="url(#bands)"/>
    <!-- Black bounds: outer frame (stroke clipped to draw inward) -->
    <path d="M487.83,319.44,295.63,36.88a48,48,0,0,0-79.26,0L24.17,319.44A47.1,47.1,0,0,0,41.1,387.57L233.3,490.32a48.05,48.05,0,0,0,45.4,0L470.9,387.57a47.1,47.1,0,0,0,16.93-68.13Z"
          fill="none" stroke="#000000" stroke-width="34" stroke-linejoin="round"/>
    <!-- Internal edge dividing the two faces -->
    <line x1="256" y1="20" x2="256" y2="505" stroke="#000000" stroke-width="16"/>
  </g>
</svg>
